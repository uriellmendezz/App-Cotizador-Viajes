name: Deploy to Hugging Face Spaces

on:
  push:
    branches:
      - version-4 # <-- CAMBIADO AQUÍ: Ahora reacciona a los pushes en esta rama
  workflow_dispatch: # Permite disparar el deploy manualmente desde GitHub

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4 # <-- TIP: Actualizado a v4 que es más rápido y estable
        with:
          fetch-depth: 0
          lfs: true

      - name: Push to Hugging Face Spaces
        env:
          HF_SPACE_PATH: "urielmendez-edu/cotizador.onetrip"
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # Eliminar el historial de Git local en el workspace de la acción para limpiar binarios históricos
          rm -rf .git
          
          # Inicializar un nuevo repositorio Git limpio desde cero en la rama version-4
          git init -b version-4 # <-- CAMBIADO AQUÍ: Inicializa la rama local de la acción como version-4
          
          # Configurar identidad de Git para el commit de despliegue
          git config --global user.email "github-actions@github.com"
          git config --global user.name "GitHub Actions"
          
          # Inicializar Git LFS
          git lfs install
          
          # Registrar las extensiones de archivos binarios en Git LFS
          git lfs track "*.ttf"
          git lfs track "*.jpg"
          git lfs track "*.jpeg"
          git lfs track "*.png"
          git lfs track "*.avif"
          
          # Agregar todos los archivos al nuevo índice de Git
          git add .
          
          # Crear un único commit limpio con los punteros LFS configurados desde el inicio
          git commit -m "Deploy version: ${{ github.sha }}"
          
          # Agregar el remoto de Hugging Face y empujar con fuerza apuntando a version-4
          git remote add hf https://user:$HF_TOKEN@huggingface.co/spaces/$HF_SPACE_PATH
          git push hf version-4:main --force # <-- CAMBIADO AQUÍ: Empuja tu rama local 'version-4' a la rama 'main' de Hugging Face