<div class="max-w-[95%] mx-auto space-y-8">
    <div id="editar-tab" class="tab-content">
        <!-- Pestañas estilo Navegador (Browser Tabs) -->
        <div class="flex items-end gap-1 px-2 relative z-10">
            <button type="button" id="tab-detalladas" onclick="switchSavedQuotesTab('detalladas')"
                class="px-6 py-3 text-xs font-bold uppercase tracking-wider rounded-t-2xl border-t border-x border-slate-200 bg-white text-slate-800 -mb-[1px] relative z-20 cursor-pointer flex items-center gap-2 transition-all duration-200 ease-in-out">
                <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
                    <path stroke-linecap="round" stroke-linejoin="round"
                        d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
                </svg>
                Cotizaciones Completas
            </button>
            <button type="button" id="tab-rapidos" onclick="switchSavedQuotesTab('rapidos')"
                class="px-6 py-3 text-xs font-bold uppercase tracking-wider rounded-t-2xl border-t border-x border-transparent bg-slate-100/50 hover:bg-slate-100 text-slate-400 hover:text-slate-600 -mb-[1px] relative z-10 cursor-pointer flex items-center gap-2 transition-all duration-200 ease-in-out">
                <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M13 10V3L4 14h7v7l9-11h-7z" />
                </svg>
                Cotizaciones Rápidas
            </button>
        </div>

        <div class="bg-white border border-slate-200 rounded-b-3xl rounded-r-3xl p-6 lg:p-8 shadow-sm">
            <div
                class="flex flex-col sm:flex-row sm:items-center justify-between gap-4 border-b border-slate-100 pb-6 mb-6">
                <div>
                    <h2 class="font-display font-extrabold text-lg text-slate-800 tracking-tight uppercase">Archivos
                        Guardados</h2>
                    <p class="text-xs text-slate-500 leading-relaxed mt-1">Listado de propuestas guardadas en la base de
                        datos de Supabase. Puedes abrirlas para editarlas o eliminarlas.</p>
                </div>
                <button onclick="loadSavedQuotesList()"
                    class="px-4 py-2.5 text-xs font-bold uppercase tracking-wider bg-slate-100 hover:bg-slate-200 text-slate-700 rounded-xl transition-all flex items-center gap-1.5 self-start sm:self-center cursor-pointer">
                    <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
                        <path stroke-linecap="round" stroke-linejoin="round"
                            d="M16.023 9.348h4.992v-.001M2.985 19.644v-4.992m0 0h4.992m-4.993 0l3.181 3.183a8.25 8.25 0 0013.803-3.7M4.031 9.865a8.25 8.25 0 0113.803-3.7l3.181 3.182m0-4.991v4.99" />
                    </svg>
                    Actualizar Lista
                </button>
            </div>

            <!-- Search Bar -->
            <div class="mt-4 mb-6 relative max-w-md">
                <div class="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none">
                    <svg class="h-4 w-4 text-slate-400" fill="none" viewBox="0 0 24 24" stroke="currentColor"
                        stroke-width="2.5">
                        <path stroke-linecap="round" stroke-linejoin="round"
                            d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                    </svg>
                </div>
                <input type="text" id="quote-search-input" oninput="filterSavedQuotes()"
                    placeholder="Buscar por pasajero o destino..."
                    class="block w-full pl-10 pr-4 py-2.5 text-sm bg-slate-50 border border-slate-200 rounded-xl focus:outline-none focus:bg-white focus:border-brand-primary transition-all">
            </div>

            <!-- Database Quotes List -->
            <div id="db-quotes-table-wrapper" class="overflow-x-auto w-full mb-10 tab-transition">
                <table class="w-full text-left border-collapse text-xs">
                    <thead id="db-quotes-table-header">
                    </thead>
                    <tbody id="db-quotes-table-body" class="divide-y divide-slate-100 text-slate-600 font-medium">
                        <tr>
                            <td colspan="7" class="p-8 text-center text-slate-400">
                                Cargando cotizaciones desde Supabase...
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
