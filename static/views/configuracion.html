<div class="max-w-[95%] mx-auto space-y-8">
    <div id="config-tab" class="tab-content">
        <div class="bg-white border border-slate-200 rounded-3xl p-6 lg:p-8 shadow-sm">
            <h2 class="font-display font-extrabold text-lg text-slate-800 tracking-tight uppercase mb-6">Configuración
                de Marca y Sincronización</h2>

            <form id="config-form" onsubmit="saveConfig(event)" class="space-y-8">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                    <!-- Branding and colors -->
                    <div class="space-y-6">
                        <h3
                            class="font-display font-bold text-sm uppercase text-slate-500 tracking-wider border-b border-slate-100 pb-2">
                            Identidad Visual</h3>

                        <div class="flex flex-col gap-2">
                            <label for="config_nombre_agencia"
                                class="text-xs font-bold text-slate-500 uppercase tracking-wider">Nombre Comercial de la
                                Agencia</label>
                            <input type="text" id="config_nombre_agencia" required
                                class="border border-slate-200 rounded-xl px-4 py-3 text-sm font-medium focus:outline-none focus:border-brand-primary focus:ring-4 focus:ring-brand-primary/10 transition-all">
                        </div>

                        <div class="flex flex-col gap-2">
                            <label for="config_nombre_agencia_legal"
                                class="text-xs font-bold text-slate-500 uppercase tracking-wider">Nombre Legal (Razón
                                Social)</label>
                            <input type="text" id="config_nombre_agencia_legal" required
                                class="border border-slate-200 rounded-xl px-4 py-3 text-sm font-medium focus:outline-none focus:border-brand-primary focus:ring-4 focus:ring-brand-primary/10 transition-all">
                        </div>

                        <div class="flex flex-col gap-2">
                            <label class="text-xs font-bold text-slate-500 uppercase tracking-wider">Colores de
                                Marca</label>
                            <div class="grid grid-cols-3 gap-4">
                                <div class="flex items-center gap-2 border border-slate-200 rounded-xl p-2 bg-white">
                                    <input type="color" id="color_primary"
                                        class="w-8 h-8 rounded-full border-0 cursor-pointer">
                                    <span class="text-xs font-bold text-slate-600">Primario</span>
                                </div>
                                <div class="flex items-center gap-2 border border-slate-200 rounded-xl p-2 bg-white">
                                    <input type="color" id="color_secondary"
                                        class="w-8 h-8 rounded-full border-0 cursor-pointer">
                                    <span class="text-xs font-bold text-slate-600">Secundario</span>
                                </div>
                                <div class="flex items-center gap-2 border border-slate-200 rounded-xl p-2 bg-white">
                                    <input type="color" id="color_neutral"
                                        class="w-8 h-8 rounded-full border-0 cursor-pointer">
                                    <span class="text-xs font-bold text-slate-600">Neutro</span>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Logo integration -->
                    <div class="space-y-6">
                        <h3
                            class="font-display font-bold text-sm uppercase text-slate-500 tracking-wider border-b border-slate-100 pb-2">
                            Logo de Agencia</h3>

                        <div class="flex flex-col gap-2">
                            <label class="text-xs font-bold text-slate-500 uppercase tracking-wider">Logo de la
                                Agencia</label>
                            <div class="flex items-center gap-4">
                                <div class="flex-1 dropzone border-2 border-dashed border-slate-200 hover:border-brand-primary rounded-xl p-4 text-center cursor-pointer min-h-[90px] flex flex-col items-center justify-center transition-all"
                                    onclick="triggerFileInput('config_logo')">
                                    <span class="text-xs text-slate-500 font-bold">Subir nuevo logo</span>
                                    <input type="file" id="config_logo" accept="image/*" class="hidden"
                                        onchange="handleImageUpload(this, 'preview-logo', 'data-logo')">
                                    <input type="hidden" id="data-logo">
                                </div>
                                <div
                                    class="w-20 h-20 border border-slate-200 rounded-xl p-2 flex items-center justify-center bg-slate-50">
                                    <img id="preview-logo" class="max-w-full max-h-full object-contain hidden" alt="">
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="flex justify-end pt-4 border-t border-slate-100">
                    <button type="submit"
                        class="px-6 py-3 bg-slate-800 hover:bg-slate-900 text-white font-extrabold text-xs uppercase tracking-wider rounded-xl shadow-md transition-all duration-300">Guardar
                        Configuración</button>
                </div>
            </form>
        </div>
    </div>
</div>
