<div class="w-full px-8 space-y-6">
    <!-- Back button -->
    <div class="pt-2">
        <button onclick="window.history.back();" class="inline-flex items-center gap-1.5 text-xs font-semibold text-slate-400 hover:text-slate-700 transition-colors cursor-pointer select-none">
            <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
                <path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7" />
            </svg>
            Volver
        </button>
    </div>

    <!-- Active Editing Indicator -->
    <div id="editing-indicator"
        class="hidden p-4 bg-amber-50 border border-amber-200 text-amber-800 rounded-2xl flex items-center justify-between text-xs font-semibold shadow-sm mb-6">
        <div class="flex items-center gap-2">
            <span id="editing-indicator-text">Editando cotización guardada</span>
        </div>
        <div id="editing-indicator-actions" class="flex gap-2">
            <!-- Botones dinámicos -->
        </div>
    </div>

    <!-- Header Section -->
    <div class="space-y-4">
        <div class="flex items-center gap-3">
            <span class="p-3 bg-brand-primary/10 rounded-2xl text-brand-primary">
                <svg class="w-8 h-8" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M13 10V3L4 14h7v7l9-11h-7z" />
                </svg>
            </span>
            <div class="flex-1">
                <input type="text" id="rapido-pasajero"
                    class="w-full text-2xl font-medium text-slate-800 border-none bg-transparent focus:ring-0 focus:outline-none placeholder-slate-300 p-0 font-display tracking-tight transition-all shadow-none"
                    placeholder="Título de la Cotización Rápida" alt="Título Presupuesto" value=""
                    style="border: none !important; background: transparent !important; background-color: transparent !important; outline: none !important; box-shadow: none !important; padding: 0 !important;"
                    autocomplete="off">
            </div>
        </div>

        <div class="flex flex-wrap items-center gap-4 md:gap-x-8 pl-0 md:pl-14 text-xs font-semibold text-slate-500">
            <!-- Pasajeros -->
            <div class="flex items-center gap-2 flex-shrink-0">
                <svg class="w-4 h-4 text-slate-400" fill="none" viewBox="0 0 24 24" stroke="currentColor"
                    stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round"
                        d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a3 3 0 11-6 0 3 3 0 016 0z" />
                </svg>
                <span class="text-slate-400 font-semibold text-sm">Pasajeros:</span>
                <input type="number" id="rapido-pax-count" min="1" value="2" required
                    class="w-20 text-center border border-slate-200 bg-slate-50/50 rounded-xl px-3 py-1.5 text-sm font-extrabold text-slate-800 focus:outline-none focus:bg-white focus:border-brand-primary focus:ring-4 focus:ring-brand-primary/10 transition-all">
            </div>

            <!-- Destino -->
            <div class="flex items-center gap-2 flex-shrink-0">
                <svg class="w-4 h-4 text-slate-400" fill="none" viewBox="0 0 24 24" stroke="currentColor"
                    stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round"
                        d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z" />
                    <path stroke-linecap="round" stroke-linejoin="round" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z" />
                </svg>
                <span class="text-slate-400 font-semibold text-sm">Destino:</span>
                <input type="text" id="rapido-destino" placeholder="Opcional"
                    class="w-64 border border-slate-200 bg-slate-50/50 rounded-xl px-3 py-1.5 text-sm font-bold text-slate-800 placeholder-slate-300 focus:outline-none focus:bg-white focus:border-brand-primary focus:ring-4 focus:ring-brand-primary/10 transition-all"
                    autocomplete="off">
            </div>

            <!-- Fecha de Salida -->
            <div class="flex items-center gap-2 flex-shrink-0">
                <svg class="w-4 h-4 text-slate-400" fill="none" viewBox="0 0 24 24" stroke="currentColor"
                    stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round"
                        d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" />
                </svg>
                <span class="text-slate-400 font-semibold text-sm">Salida:</span>
                <input type="text" id="rapido-fecha-salida" placeholder="Opcional" readonly
                    class="w-36 border border-slate-200 bg-slate-50/50 rounded-xl px-3 py-1.5 text-sm font-bold text-slate-800 placeholder-slate-300 cursor-pointer focus:outline-none focus:bg-white focus:border-brand-primary focus:ring-4 focus:ring-brand-primary/10 transition-all">
            </div>

            <!-- Fecha de Regreso -->
            <div class="flex items-center gap-2 flex-shrink-0">
                <svg class="w-4 h-4 text-slate-400" fill="none" viewBox="0 0 24 24" stroke="currentColor"
                    stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round"
                        d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" />
                </svg>
                <span class="text-slate-400 font-semibold text-sm">Regreso:</span>
                <input type="text" id="rapido-fecha-regreso" placeholder="Opcional" readonly
                    class="w-36 border border-slate-200 bg-slate-50/50 rounded-xl px-3 py-1.5 text-sm font-bold text-slate-800 placeholder-slate-300 cursor-pointer focus:outline-none focus:bg-white focus:border-brand-primary focus:ring-4 focus:ring-brand-primary/10 transition-all">
            </div>
        </div>
    </div>

    <!-- Table & Actions Group -->
    <div class="w-full space-y-6 mt-10">
        <!-- Single Clean Table -->
        <div class="bg-white border border-slate-200/80 rounded-3xl p-6 shadow-sm overflow-hidden">
            <div class="flex justify-between items-center mb-6">
                <h3 class="text-sm font-extrabold text-slate-700 uppercase tracking-wider flex items-center gap-2">
                    <svg class="w-4 h-4 text-brand-primary" fill="none" viewBox="0 0 24 24" stroke="currentColor"
                        stroke-width="2.5">
                        <path stroke-linecap="round" stroke-linejoin="round"
                            d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2" />
                    </svg>
                    Desglose
                </h3>
                <div class="flex items-center gap-3">
                    <!-- Limpiar y restablecer a default -->
                    <button type="button" id="btn-reset-quick-budget"
                        class="hidden items-center gap-1.5 px-3 py-2 bg-slate-100 hover:bg-slate-200 text-slate-600 rounded-xl text-xs font-bold transition-all cursor-pointer flex-shrink-0"
                        title="Restablecer tabla a valores por defecto">
                        <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor"
                            stroke-width="2.5">
                            <path stroke-linecap="round" stroke-linejoin="round"
                                d="M16.023 9.348h4.992v-.001M2.985 19.644v-4.992m0 0h4.992m-4.993 0l3.181 3.183a8.25 8.25 0 0013.803-3.7M4.031 9.865a8.25 8.25 0 0113.803-3.7l3.181 3.182m0-4.991v4.99" />
                        </svg>
                        Limpiar
                    </button>

                    <!-- Hover Dropdown Menu -->
                    <div id="quick-add-concept-container" class="relative group inline-block">
                        <button type="button"
                            class="px-4 py-2 bg-brand-primary/10 hover:bg-brand-primary hover:text-white text-brand-primary rounded-xl text-xs font-extrabold uppercase tracking-wider transition-all cursor-pointer flex items-center gap-1.5 shadow-sm">
                            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"
                                stroke-width="2.5">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4" />
                            </svg>
                            Agregar Concepto
                        </button>
                        <div class="absolute right-0 top-full pt-2 w-44 z-20 hidden group-hover:block hover:block">
                            <div class="bg-white border border-slate-200 rounded-xl shadow-lg py-1">
                                <button type="button" id="btn-add-flight"
                                    class="w-full text-left px-4 py-2.5 text-xs font-semibold text-slate-700 hover:bg-slate-50 hover:text-brand-primary transition-all flex items-center gap-2">
                                    <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor"
                                        stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                        <path
                                            d="M21 16v-2l-8-5V3.5c0-.83-.67-1.5-1.5-1.5S10 2.67 10 3.5V9l-8 5v2l8-2.5V19l-2 1.5V22l3.5-1 3.5 1v-1.5L14 19v-5.5l8 2.5z" />
                                    </svg>
                                    Vuelo
                                </button>
                                <button type="button" id="btn-add-hotel"
                                    class="w-full text-left px-4 py-2.5 text-xs font-semibold text-slate-700 hover:bg-slate-50 hover:text-brand-primary transition-all flex items-center gap-2">
                                    <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor"
                                        stroke-width="2">
                                        <path stroke-linecap="round" stroke-linejoin="round"
                                            d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4" />
                                    </svg>
                                    Alojamiento
                                </button>
                                <button type="button" id="btn-add-transfer"
                                    class="w-full text-left px-4 py-2.5 text-xs font-semibold text-slate-700 hover:bg-slate-50 hover:text-brand-primary transition-all flex items-center gap-2">
                                    <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor"
                                        stroke-width="2">
                                        <path stroke-linecap="round" stroke-linejoin="round"
                                            d="M8 7h12m0 0l-4-4m4 4l-4 4m0 6H4m0 0l4 4m-4-4l4-4" />
                                    </svg>
                                    Traslado
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="overflow-x-auto max-h-[500px] overflow-y-auto relative">
                <table class="w-full text-left border-collapse text-sm select-none relative">
                    <thead>
                        <tr class="border-b border-slate-200 text-slate-400 bg-white sticky top-0 z-10">
                            <th class="py-3 font-bold uppercase tracking-wider text-[10px] bg-white">Concepto</th>
                            <th
                                class="py-3 font-bold uppercase tracking-wider text-[10px] w-[160px] text-right bg-white">
                                Total (USD)</th>
                            <th
                                class="py-3 font-bold uppercase tracking-wider text-[10px] w-[140px] text-right bg-white">
                                Por
                                Persona (USD)</th>
                            <th
                                class="py-3 font-bold uppercase tracking-wider text-[10px] w-[50px] text-center bg-white">
                            </th>
                        </tr>
                    </thead>
                    <tbody id="quick-budget-body" class="divide-y divide-slate-100">
                        <!-- Dynamic rows generated here -->
                    </tbody>
                    <tfoot
                        class="sticky bottom-0 z-10 border-t-2 border-slate-200 bg-slate-50 shadow-[0_-4px_10px_rgba(0,0,0,0.04)]">
                        <!-- Costo Total Row -->
                        <tr class="bg-slate-50 font-bold">
                            <td class="py-4 font-black text-slate-800 text-sm pl-3 bg-slate-50">TOTAL</td>
                            <td id="rapido-total-final"
                                class="py-4 text-right font-black text-slate-800 text-sm pr-2.5 bg-slate-50">USD 0,00
                            </td>
                            <td id="rapido-total-pax"
                                class="py-4 text-right font-black text-brand-primary text-sm pr-3 bg-slate-50">USD 0,00
                            </td>
                            <td class="bg-slate-50"></td>
                        </tr>
                    </tfoot>
                </table>
            </div>
        </div>

        <!-- Footer Actions -->
        <div class="flex flex-col sm:flex-row gap-4 justify-end mt-8">
            <button type="button" id="btn-save-quick-only"
                class="px-6 py-3.5 bg-slate-100 hover:bg-slate-200 text-slate-700 font-extrabold text-xs uppercase tracking-wider rounded-xl transition-all active:scale-95 cursor-pointer">
                Guardar
            </button>
            <button type="button" id="btn-save-quick-and-go"
                class="px-6 py-3.5 bg-slate-900 hover:bg-slate-800 text-white font-extrabold text-xs uppercase tracking-wider rounded-xl shadow-lg shadow-slate-900/20 transition-all active:scale-95 cursor-pointer flex items-center justify-center gap-1.5">
                Continuar a Cotización Completa
                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M13 5l7 7-7 7M5 5l7 7-7 7" />
                </svg>
            </button>
        </div>
    </div>
</div>
