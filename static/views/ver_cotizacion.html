<div class="max-w-[98%] mx-auto space-y-6 py-6">
    <!-- Back button -->
    <div>
        <button onclick="window.history.back();" class="inline-flex items-center gap-1.5 text-xs font-semibold text-slate-400 hover:text-slate-700 transition-colors cursor-pointer select-none">
            <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
                <path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7" />
            </svg>
            Volver
        </button>
    </div>

    <!-- Split-Screen Grid -->
    <div class="grid grid-cols-1 lg:grid-cols-12 gap-8 pt-2">
        <!-- Columna Izquierda: Visor de PDF (8 cols on lg) -->
        <div class="lg:col-span-8 flex flex-col bg-white border border-slate-200 rounded-3xl overflow-hidden shadow-lg w-full"
            style="height: 125vh; min-height: 1150px;">
            <div class="bg-slate-50 px-5 py-3 border-b border-slate-200 flex justify-between items-center">
                <span class="text-xs font-extrabold uppercase text-slate-500 tracking-wider flex items-center gap-2">
                    <span class="w-2.5 h-2.5 rounded-full bg-brand-primary animate-pulse"></span>
                    Previsualización del PDF
                </span>
                <button type="button" onclick="window.openPDFInNewTab()"
                    class="flex items-center gap-1.5 px-3 py-1 bg-white hover:bg-slate-100 text-slate-700 border border-slate-200 rounded-lg text-[10px] font-extrabold uppercase tracking-wider shadow-sm transition-all hover:scale-[1.02] active:scale-[0.98] cursor-pointer">
                    <svg class="w-3.5 h-3.5 text-brand-primary" fill="none" viewBox="0 0 24 24" stroke="currentColor"
                        stroke-width="2.5">
                        <path stroke-linecap="round" stroke-linejoin="round"
                            d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14" />
                    </svg>
                    Abrir en nueva pestaña
                </button>
            </div>
            <div class="flex-1 w-full bg-slate-100 relative">
                <iframe id="ver-pdf-iframe" class="absolute inset-0 w-full h-full border-0" src=""
                    allowfullscreen="true"></iframe>
            </div>
        </div>
        <!-- Columna Derecha: Panel de Detalles (4 cols on lg) -->
        <div class="lg:col-span-4 flex flex-col gap-6 w-full self-start">
            <!-- Action Buttons Group (Icon-Only 1 Row / N Columns Layout with Hover Tooltips) -->
            <div class="flex flex-row items-center gap-3 w-full">
                <!-- Editar -->
                <div class="relative group flex-1">
                    <button type="button" id="btn-edit-quote-view" onclick="window.editQuoteFromView()"
                        title="Editar Cotización"
                        class="w-full flex items-center justify-center p-3.5 bg-brand-primary hover:bg-brand-primary/95 text-white rounded-2xl shadow-md shadow-brand-primary/20 transition-all duration-200 hover:scale-105 active:scale-95 cursor-pointer">
                        <svg class="w-5 h-5 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
                            <path stroke-linecap="round" stroke-linejoin="round"
                                d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z" />
                        </svg>
                    </button>
                    <!-- Tooltip -->
                    <div class="absolute bottom-full left-1/2 -translate-x-1/2 mb-2 px-2.5 py-1 bg-slate-900 text-white text-[10px] font-extrabold uppercase tracking-wider rounded-lg opacity-0 group-hover:opacity-100 pointer-events-none transition-all duration-200 whitespace-nowrap z-30 shadow-xl">
                        Editar Cotización
                        <div class="absolute top-full left-1/2 -translate-x-1/2 border-4 border-transparent border-t-slate-900"></div>
                    </div>
                </div>

                <!-- Descargar PDF -->
                <div class="relative group flex-1">
                    <button type="button" onclick="window.downloadPDFBlob()"
                        title="Descargar PDF"
                        class="w-full flex items-center justify-center p-3.5 bg-slate-900 hover:bg-slate-800 text-white rounded-2xl shadow-md transition-all duration-200 hover:scale-105 active:scale-95 cursor-pointer">
                        <svg class="w-5 h-5 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                            <path stroke-linecap="round" stroke-linejoin="round"
                                d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" />
                        </svg>
                    </button>
                    <!-- Tooltip -->
                    <div class="absolute bottom-full left-1/2 -translate-x-1/2 mb-2 px-2.5 py-1 bg-slate-900 text-white text-[10px] font-extrabold uppercase tracking-wider rounded-lg opacity-0 group-hover:opacity-100 pointer-events-none transition-all duration-200 whitespace-nowrap z-30 shadow-xl">
                        Descargar PDF
                        <div class="absolute top-full left-1/2 -translate-x-1/2 border-4 border-transparent border-t-slate-900"></div>
                    </div>
                </div>

                <!-- Duplicar -->
                <div class="relative group flex-1">
                    <button type="button" id="btn-duplicate-quote-view" onclick="window.duplicateQuoteFromView()"
                        title="Duplicar Cotización"
                        class="w-full flex items-center justify-center p-3.5 bg-white hover:bg-slate-50 text-slate-700 border border-slate-200/80 rounded-2xl shadow-sm hover:shadow-md transition-all duration-200 hover:scale-105 active:scale-95 cursor-pointer">
                        <svg class="w-5 h-5 flex-shrink-0 text-slate-600" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
                            <path stroke-linecap="round" stroke-linejoin="round"
                                d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z" />
                        </svg>
                    </button>
                    <!-- Tooltip -->
                    <div class="absolute bottom-full left-1/2 -translate-x-1/2 mb-2 px-2.5 py-1 bg-slate-900 text-white text-[10px] font-extrabold uppercase tracking-wider rounded-lg opacity-0 group-hover:opacity-100 pointer-events-none transition-all duration-200 whitespace-nowrap z-30 shadow-xl">
                        Duplicar Cotización
                        <div class="absolute top-full left-1/2 -translate-x-1/2 border-4 border-transparent border-t-slate-900"></div>
                    </div>
                </div>

                <!-- Eliminar -->
                <div class="relative group flex-1">
                    <button type="button" id="btn-delete-quote-view" onclick="window.deleteQuoteFromView()"
                        title="Eliminar Cotización"
                        class="w-full flex items-center justify-center p-3.5 bg-rose-50 hover:bg-rose-100/80 text-rose-600 border border-rose-200/60 rounded-2xl shadow-sm hover:shadow-md transition-all duration-200 hover:scale-105 active:scale-95 cursor-pointer">
                        <svg class="w-5 h-5 flex-shrink-0 text-rose-500" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
                            <path stroke-linecap="round" stroke-linejoin="round"
                                d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
                        </svg>
                    </button>
                    <!-- Tooltip -->
                    <div class="absolute bottom-full left-1/2 -translate-x-1/2 mb-2 px-2.5 py-1 bg-slate-900 text-white text-[10px] font-extrabold uppercase tracking-wider rounded-lg opacity-0 group-hover:opacity-100 pointer-events-none transition-all duration-200 whitespace-nowrap z-30 shadow-xl">
                        Eliminar Cotización
                        <div class="absolute top-full left-1/2 -translate-x-1/2 border-4 border-transparent border-t-slate-900"></div>
                    </div>
                </div>
            </div>

            <!-- Details Container (White clean bg) -->
            <div class="bg-white border border-slate-200/80 rounded-3xl p-6 lg:p-7 shadow-md flex flex-col justify-between">
                <div class="space-y-4">
                    <div class="flex items-center justify-between border-b border-slate-100 pb-3.5">
                        <h3 class="text-[11px] font-extrabold text-slate-400 uppercase tracking-widest">Detalles de Cotización</h3>
                    </div>

                    <!-- Metadata Table (Clean horizontal borders, generous padding, hover highlight) -->
                    <div class="divide-y divide-slate-100">
                        <div class="py-3 px-3.5 hover:bg-slate-50/70 rounded-xl transition-colors flex flex-col justify-center">
                            <span class="text-[9px] font-black text-slate-400 uppercase tracking-widest">Pasajero</span>
                            <span id="ver-pax-name" class="text-xs font-bold text-slate-800 mt-1">-</span>
                        </div>
                        <div class="py-3 px-3.5 hover:bg-slate-50/70 rounded-xl transition-colors flex flex-col justify-center">
                            <span class="text-[9px] font-black text-slate-400 uppercase tracking-widest">Destino</span>
                            <span id="ver-destino" class="text-xs font-bold text-slate-800 mt-1">-</span>
                        </div>
                        <div class="py-3 px-3.5 hover:bg-slate-50/70 rounded-xl transition-colors flex flex-col justify-center">
                            <span class="text-[9px] font-black text-slate-400 uppercase tracking-widest">Agente Emisor</span>
                            <span id="ver-agente" class="text-xs font-bold text-slate-800 mt-1">-</span>
                        </div>
                        <div class="py-3 px-3.5 hover:bg-slate-50/70 rounded-xl transition-colors flex flex-col justify-center">
                            <span class="text-[9px] font-black text-slate-400 uppercase tracking-widest">Fecha de Creación</span>
                            <span id="ver-created-at" class="text-xs font-bold text-slate-800 mt-1">-</span>
                        </div>
                        <div class="py-3 px-3.5 hover:bg-slate-50/70 rounded-xl transition-colors flex flex-col justify-center">
                            <span class="text-[9px] font-black text-slate-400 uppercase tracking-widest">Última Actualización</span>
                            <span id="ver-updated-at" class="text-xs font-bold text-slate-800 mt-1">-</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
 </div>
    </div>
</div>
