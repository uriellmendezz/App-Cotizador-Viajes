<div class="max-w-[98%] mx-auto space-y-6 py-6">
    <!-- Back Button -->
    <div class="flex justify-between items-center">
        <button type="button" id="page-back-btn" onclick="navigateBack()" title="Volver"
            class="inline-flex items-center gap-1.5 px-3 py-1.5 bg-slate-100 hover:bg-slate-200 text-slate-600 rounded-xl text-xs font-bold transition-all cursor-pointer">
            <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
                <path stroke-linecap="round" stroke-linejoin="round" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
            </svg>
            <span class="back-btn-label">Volver</span>
        </button>
    </div>

    <!-- Split-Screen Grid -->
    <div class="grid grid-cols-1 lg:grid-cols-12 gap-8 pt-2">
        <!-- Columna Izquierda: Visor de PDF (8 cols on lg) -->
        <div class="lg:col-span-8 flex flex-col bg-white border border-slate-200 rounded-3xl overflow-hidden shadow-lg w-full" style="height: 85vh; min-height: 750px;">
            <div class="bg-slate-50 px-5 py-3 border-b border-slate-200 flex justify-between items-center">
                <span class="text-xs font-extrabold uppercase text-slate-500 tracking-wider flex items-center gap-2">
                    <span class="w-2.5 h-2.5 rounded-full bg-brand-primary animate-pulse"></span>
                    Previsualización del PDF
                </span>
                <button type="button" onclick="window.openPDFInNewTab()"
                    class="flex items-center gap-1.5 px-3 py-1 bg-white hover:bg-slate-100 text-slate-700 border border-slate-200 rounded-lg text-[10px] font-extrabold uppercase tracking-wider shadow-sm transition-all hover:scale-[1.02] active:scale-[0.98] cursor-pointer">
                    <svg class="w-3.5 h-3.5 text-brand-primary" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14" />
                    </svg>
                    Abrir en nueva pestaña
                </button>
            </div>
            <div class="flex-1 w-full bg-slate-100 relative">
                <iframe id="ver-pdf-iframe" class="absolute inset-0 w-full h-full border-0" src="" allowfullscreen="true"></iframe>
            </div>
        </div>

        <!-- Columna Derecha: Panel de Detalles (4 cols on lg) -->
        <div class="lg:col-span-4 flex flex-col gap-6 w-full self-start">
            <!-- Details Container (White clean bg) -->
            <div class="bg-white border border-slate-200 rounded-3xl p-6 lg:p-8 shadow-md flex flex-col justify-between">
                <div class="space-y-6">
                    <!-- Componente de Acción (Superior): Editar -->
                    <div class="flex items-center justify-between border-b border-slate-100 pb-4">
                        <h3 class="text-xs font-extrabold text-slate-400 uppercase tracking-widest">Detalles de Cotización</h3>
                        <button type="button" id="btn-edit-quote-view" onclick="window.editQuoteFromView()"
                            class="inline-flex items-center gap-2 px-4 py-2 bg-brand-primary hover:bg-brand-primary/95 text-white rounded-xl text-xs font-extrabold uppercase tracking-wider shadow-md shadow-brand-primary/20 transition-all hover:-translate-y-0.5 active:translate-y-0 cursor-pointer">
                            <!-- Pencil Icon -->
                            <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z" />
                            </svg>
                            Editar
                        </button>
                    </div>

                    <!-- Metadata List -->
                    <div class="space-y-5">
                        <div class="flex flex-col">
                            <span class="text-[9px] font-black text-slate-400 uppercase tracking-widest">Pasajero</span>
                            <span id="ver-pax-name" class="text-sm font-semibold text-slate-700 mt-1">-</span>
                        </div>
                        <div class="flex flex-col">
                            <span class="text-[9px] font-black text-slate-400 uppercase tracking-widest">Destino</span>
                            <span id="ver-destino" class="text-sm font-semibold text-slate-700 mt-1">-</span>
                        </div>
                        <div class="flex flex-col">
                            <span class="text-[9px] font-black text-slate-400 uppercase tracking-widest">Agente Emisor</span>
                            <span id="ver-agente" class="text-sm font-semibold text-slate-700 mt-1">-</span>
                        </div>
                        <div class="flex flex-col">
                            <span class="text-[9px] font-black text-slate-400 uppercase tracking-widest">Fecha de Creación</span>
                            <span id="ver-created-at" class="text-sm font-semibold text-slate-700 mt-1">-</span>
                        </div>
                        <div class="flex flex-col">
                            <span class="text-[9px] font-black text-slate-400 uppercase tracking-widest">Última Actualización</span>
                            <span id="ver-updated-at" class="text-sm font-semibold text-slate-700 mt-1">-</span>
                        </div>
                    </div>
                </div>

                <!-- Action Button at the bottom (Download PDF) -->
                <div class="pt-6 border-t border-slate-100 mt-6">
                    <button type="button" onclick="window.downloadPDFBlob()"
                        class="w-full flex items-center justify-center gap-2 px-5 py-3.5 bg-slate-900 hover:bg-slate-800 text-white font-extrabold text-xs uppercase tracking-wider rounded-xl shadow-lg transition-all hover:-translate-y-0.5 active:translate-y-0 cursor-pointer">
                        <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" />
                        </svg>
                        Descargar PDF
                    </button>
                </div>
            </div>
        </div>
    </div>
</div>
