<div class="max-w-[95%] mx-auto space-y-8">
    <button type="button" onclick="navigateTo('/inicio')"
        class="inline-flex items-center gap-1.5 px-3 py-1.5 bg-slate-100 hover:bg-slate-200 text-slate-600 rounded-xl text-xs font-bold transition-all cursor-pointer">
        <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
            <path stroke-linecap="round" stroke-linejoin="round" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
        </svg>
        Volver al Inicio
    </button>

    <!-- Notion-like Header -->
    <div class="space-y-4">
        <div class="flex items-center gap-3">
            <span class="p-3 bg-brand-primary/10 rounded-2xl text-brand-primary">
                <svg class="w-8 h-8" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
                    <path stroke-linecap="round" stroke-linejoin="round"
                        d="M9 17v-2m3 2v-4m3 4v-6m2 10H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
                </svg>
            </span>
            <div class="flex-1">
                <input type="text" id="rapido-pasajero"
                    class="w-full text-2xl font-semibold text-slate-800 border border-slate-200 rounded-2xl bg-slate-50/50 focus:bg-white focus:border-brand-primary focus:ring-4 focus:ring-brand-primary/10 focus:outline-none placeholder-slate-400 py-3 px-5 font-display tracking-tight transition-all duration-300 shadow-sm"
                    placeholder="Título Presupuesto" alt="Título Presupuesto" value="">
            </div>
        </div>
        <div class="flex items-center gap-2 pl-14 text-sm font-semibold text-slate-500">
            <span>Presupuesto para</span>
            <div class="relative flex items-center">
                <input type="number" id="rapido-pax-count" min="1" value="2"
                    class="w-12 text-center border-b border-slate-200 focus:border-brand-primary bg-transparent py-0.5 px-1 focus:outline-none focus:ring-0 text-sm font-extrabold text-slate-800">
            </div>
            <span>pasajeros</span>
        </div>
    </div>

    <!-- Single Clean Table -->
    <div class="bg-white border border-slate-200/80 rounded-3xl p-6 shadow-sm overflow-hidden">
        <div class="flex justify-between items-center mb-6">
            <h3 class="text-sm font-extrabold text-slate-700 uppercase tracking-wider flex items-center gap-2">
                <svg class="w-4 h-4 text-brand-primary" fill="none" viewBox="0 0 24 24" stroke="currentColor"
                    stroke-width="2.5">
                    <path stroke-linecap="round" stroke-linejoin="round"
                        d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2" />
                </svg>
                Desglose de Conceptos
            </h3>
            <!-- Hover Dropdown Menu -->
            <div class="relative group inline-block">
                <button type="button"
                    class="px-4 py-2 bg-brand-primary/10 hover:bg-brand-primary hover:text-white text-brand-primary rounded-xl text-xs font-extrabold uppercase tracking-wider transition-all cursor-pointer flex items-center gap-1.5 shadow-sm">
                    <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4" />
                    </svg>
                    Agregar Concepto
                </button>
                <div class="absolute right-0 top-full pt-2 w-44 z-20 hidden group-hover:block hover:block">
                    <div class="bg-white border border-slate-200 rounded-xl shadow-lg py-1">
                        <button type="button" id="btn-add-flight"
                            class="w-full text-left px-4 py-2.5 text-xs font-semibold text-slate-700 hover:bg-slate-50 hover:text-brand-primary transition-all flex items-center gap-2">
                            <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor"
                                stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M21 16v-2l-8-5V3.5c0-.83-.67-1.5-1.5-1.5S10 2.67 10 3.5V9l-8 5v2l8-2.5V19l-2 1.5V22l3.5-1 3.5 1v-1.5L14 19v-5.5l8 2.5z" />
                            </svg>
                            Vuelo
                        </button>
                        <button type="button" id="btn-add-hotel"
                            class="w-full text-left px-4 py-2.5 text-xs font-semibold text-slate-700 hover:bg-slate-50 hover:text-brand-primary transition-all flex items-center gap-2">
                            <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor"
                                stroke-width="2">
                                <path stroke-linecap="round" stroke-linejoin="round"
                                    d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4" />
                            </svg>
                            Alojamiento
                        </button>
                        <button type="button" id="btn-add-transfer"
                            class="w-full text-left px-4 py-2.5 text-xs font-semibold text-slate-700 hover:bg-slate-50 hover:text-brand-primary transition-all flex items-center gap-2">
                            <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor"
                                stroke-width="2">
                                <path stroke-linecap="round" stroke-linejoin="round"
                                    d="M8 7h12m0 0l-4-4m4 4l-4 4m0 6H4m0 0l4 4m-4-4l4-4" />
                            </svg>
                            Traslado
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <div class="overflow-x-auto max-h-[500px] overflow-y-auto relative">
            <table class="w-full text-left border-collapse text-sm select-none relative">
                <thead>
                    <tr class="border-b border-slate-200 text-slate-400 bg-white sticky top-0 z-10">
                        <th class="py-3 font-bold uppercase tracking-wider text-[10px] w-[45%] bg-white">Concepto</th>
                        <th class="py-3 font-bold uppercase tracking-wider text-[10px] w-[25%] text-right bg-white">
                            Total (USD)</th>
                        <th class="py-3 font-bold uppercase tracking-wider text-[10px] w-[25%] text-right bg-white">Por
                            Persona (USD)</th>
                        <th class="py-3 font-bold uppercase tracking-wider text-[10px] w-[5%] text-center bg-white">
                        </th>
                    </tr>
                </thead>
                <tbody id="quick-budget-body" class="divide-y divide-slate-100">
                    <!-- Dynamic rows generated here -->
                </tbody>
                <tfoot
                    class="sticky bottom-0 z-10 border-t-2 border-slate-200 bg-slate-50 shadow-[0_-4px_10px_rgba(0,0,0,0.04)]">
                    <!-- Costo Total Row -->
                    <tr class="bg-slate-50 font-bold">
                        <td class="py-4 font-black text-slate-800 text-sm pl-3 bg-slate-50">COSTO TOTAL ESTIMADO</td>
                        <td id="rapido-total-final"
                            class="py-4 text-right font-black text-slate-800 text-sm pr-2.5 bg-slate-50">USD 0,00</td>
                        <td id="rapido-total-pax"
                            class="py-4 text-right font-black text-brand-primary text-sm pr-3 bg-slate-50">USD 0,00</td>
                        <td class="bg-slate-50"></td>
                    </tr>
                </tfoot>
            </table>
        </div>
    </div>

    <!-- Footer Actions -->
    <div class="flex flex-col sm:flex-row gap-4 justify-end">
        <button type="button" id="btn-save-quick-only"
            class="px-6 py-3.5 bg-slate-100 hover:bg-slate-200 text-slate-700 font-extrabold text-xs uppercase tracking-wider rounded-xl transition-all active:scale-95 cursor-pointer">
            Guardar Presupuesto Rápido
        </button>
        <button type="button" id="btn-save-quick-and-go"
            class="px-6 py-3.5 bg-gradient-to-r from-brand-primary to-brand-accent hover:from-brand-primary/95 hover:to-brand-accent/95 text-white font-extrabold text-xs uppercase tracking-wider rounded-xl shadow-lg shadow-brand-primary/20 transition-all active:scale-95 cursor-pointer flex items-center justify-center gap-1.5">
            Continuar a Cotización Completa
            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
                <path stroke-linecap="round" stroke-linejoin="round" d="M13 5l7 7-7 7M5 5l7 7-7 7" />
            </svg>
        </button>
    </div>
</div>
