<!-- views/admin_login.html -->
<div id="admin-login-page-container" class="opacity-0 transition-opacity duration-300 min-h-screen flex items-center justify-center p-4 bg-slate-50">
    <div class="max-w-md w-full">
        <!-- Brand Logo & Header -->
        <div class="text-center mb-8">
            <img src="/assets/Logo%20ONE%20TRIP.png" alt="One Trip Giordano" class="h-20 w-auto mx-auto object-contain mb-4 transform hover:scale-105 transition-transform" />
            <span class="px-3 py-1 bg-slate-900/5 text-slate-500 font-black text-[9px] uppercase tracking-widest rounded-full border border-slate-900/10">Portal de Soporte</span>
            <h1 class="font-display font-black text-2xl text-slate-800 tracking-tight mt-3">ADMIN PANEL</h1>
            <p class="text-xs text-slate-400 font-semibold mt-1">Ingresa tus credenciales de Administrador Global.</p>
        </div>

        <!-- Login Card -->
        <div class="bg-white border border-slate-200/80 rounded-3xl p-6 lg:p-8 shadow-2xl">
            <!-- Form Error Alert -->
            <div id="admin-login-alert" class="hidden mb-6 p-4 rounded-xl font-bold bg-rose-50 border border-rose-100 text-rose-800 text-xs transition-all"></div>

            <form id="form-admin-login" class="space-y-5">
                <div>
                    <label class="block text-[10px] font-black uppercase text-slate-400 tracking-wider mb-2">Usuario o Correo</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 pl-3.5 flex items-center text-slate-400">
                            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M16 12a4 4 0 10-8 0 4 4 0 008 0zm0 0v1.5a2.5 2.5 0 005 0V12a9 9 0 10-9 9m4.5-1.206a8.959 8.959 0 01-4.5 1.206" />
                            </svg>
                        </span>
                        <input type="text" id="admin-login-username" required placeholder="correo@onetrip.com o admin"
                               class="w-full pl-10 pr-4 py-3 bg-slate-50 border border-slate-200 focus:border-brand-primary focus:bg-white rounded-xl text-xs font-bold text-slate-700 placeholder-slate-400 focus:outline-none transition-all" />
                    </div>
                </div>

                <div>
                    <label class="block text-[10px] font-black uppercase text-slate-400 tracking-wider mb-2">Contraseña</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 pl-3.5 flex items-center text-slate-400">
                            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
                            </svg>
                        </span>
                        <input type="password" id="admin-login-password" required placeholder="••••••••"
                               class="w-full pl-10 pr-12 py-3 bg-slate-50 border border-slate-200 focus:border-brand-primary focus:bg-white rounded-xl text-xs font-bold text-slate-700 placeholder-slate-400 focus:outline-none transition-all" />
                        <!-- Toggle Password Visibility -->
                        <button type="button" id="admin-login-password-toggle" class="absolute inset-y-0 right-0 pr-4 flex items-center text-slate-400 hover:text-slate-600 transition-colors cursor-pointer">
                            <svg class="w-4.5 h-4.5" id="admin-login-pass-icon" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                                <path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                            </svg>
                        </button>
                    </div>
                </div>

                <div class="pt-2">
                    <button type="submit" class="w-full px-4 py-3 bg-slate-900 hover:bg-slate-800 text-white font-bold text-xs uppercase tracking-wider rounded-xl shadow-lg transition-all cursor-pointer">
                        Ingresar al Panel
                    </button>
                </div>
            </form>
        </div>

        <!-- Back Link -->
        <div class="text-center mt-6">
            <a href="/login" onclick="event.preventDefault(); window.navigateTo('/login')" class="text-xs font-bold text-slate-400 hover:text-brand-primary transition-colors">
                ← Volver al Acceso de Agentes
            </a>
        </div>
    </div>
</div>
