<div class="max-w-[95%] mx-auto space-y-8">
    <button type="button" onclick="navigateTo('/inicio')" class="inline-flex items-center gap-1.5 px-3 py-1.5 bg-slate-100 hover:bg-slate-200 text-slate-600 rounded-xl text-xs font-bold transition-all cursor-pointer">
        <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
            <path stroke-linecap="round" stroke-linejoin="round" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
        </svg>
        Volver al Inicio
    </button>
    
    <div id="cotizaciones-rapidas-tab" class="tab-content">
        <div class="bg-white border border-slate-200 rounded-3xl p-6 lg:p-8 shadow-sm">
            <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-4 border-b border-slate-100 pb-6 mb-6">
                <div>
                    <h2 class="font-display font-extrabold text-lg text-slate-800 tracking-tight uppercase">Cotizaciones Rápidas Guardadas</h2>
                    <p class="text-xs text-slate-500 leading-relaxed mt-1">Listado de cotizaciones rápidas guardadas en la base de datos. Haz clic en una fila para reabrirla.</p>
                </div>
                <button onclick="loadQuickBudgetsList()"
                    class="px-4 py-2.5 text-xs font-bold uppercase tracking-wider bg-slate-100 hover:bg-slate-200 text-slate-700 rounded-xl transition-all flex items-center gap-1.5 self-start sm:self-center cursor-pointer">
                    <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M16.023 9.348h4.992v-.001M2.985 19.644v-4.992m0 0h4.992m-4.993 0l3.181 3.183a8.25 8.25 0 0013.803-3.7M4.031 9.865a8.25 8.25 0 0113.803-3.7l3.181 3.182m0-4.991v4.99" />
                    </svg>
                    Actualizar Lista
                </button>
            </div>
 
            <!-- Search Bar -->
            <div class="mt-4 mb-6 relative max-w-md">
                <div class="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none">
                    <svg class="h-4 w-4 text-slate-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                    </svg>
                </div>
                <input type="text" id="budget-search-input" oninput="filterQuickBudgets()"
                    placeholder="Buscar por pasajero..."
                    class="block w-full pl-10 pr-4 py-2.5 text-sm bg-slate-50 border border-slate-200 rounded-xl focus:outline-none focus:bg-white focus:border-brand-primary transition-all">
            </div>
 
            <!-- Quick Budgets List Table -->
            <div class="overflow-x-auto w-full mb-10">
                <table class="w-full text-left border-collapse text-xs">
                    <thead>
                        <tr class="border-b border-slate-200 text-slate-400 font-bold uppercase tracking-wider text-[10px]">
                            <th class="p-3">Fecha Creado</th>
                            <th class="p-3">Pasajero</th>
                            <th class="p-3 text-center">Pasajeros</th>
                            <th class="p-3">Agente</th>
                            <th class="p-3 text-right">Costo Total</th>
                            <th class="p-3 text-center">Acción</th>
                        </tr>
                    </thead>
                    <tbody id="db-budgets-table-body" class="divide-y divide-slate-100 text-slate-600 font-medium">
                        <tr>
                            <td colspan="6" class="p-8 text-center text-slate-400">
                                Cargando cotizaciones rápidas...
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
