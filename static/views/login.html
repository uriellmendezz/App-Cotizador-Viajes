<div id="login-screen"
    class="fixed inset-0 z-[3000] bg-slate-50 flex items-center justify-center transition-all duration-500 overflow-hidden">
    <!-- Slideshow de fondo -->
    <div id="login-background-slideshow" class="absolute inset-0 z-0">
        <div class="login-bg-layer" style="background-image: url('/assets/fondos/fondo-1.jpg');"></div>
        <div class="login-bg-layer" style="background-image: url('/assets/fondos/fondo-2.avif');"></div>
        <div class="login-bg-layer" style="background-image: url('/assets/fondos/fondo-3.jpg');"></div>
        <div class="login-bg-layer" style="background-image: url('/assets/fondos/fondo-4.jpeg');"></div>
        <div class="login-bg-layer" style="background-image: url('/assets/fondos/fondo-5.jpg');"></div>
        <div class="login-bg-layer" style="background-image: url('/assets/fondos/fondo-6.jpg');"></div>
    </div>

    <!-- Capa de superposición clara sobre las imágenes -->
    <div class="absolute inset-0 bg-white/50 z-[5] backdrop-blur-[2px]"></div>

    <!-- Panel de login con Glassmorphism -->
    <div
        class="glass-login-panel z-10 w-[90%] max-w-md rounded-3xl p-8 lg:p-10 text-center relative border border-white/20 shadow-2xl flex flex-col gap-6">
        <div class="flex justify-center mb-2">
            <img src="/assets/banner%20login.png" alt="One Trip Giordano" class="h-20 w-auto object-contain">
        </div>

        <div id="login-welcome-section" class="space-y-1">
            <h2 class="font-display font-extrabold text-lg text-slate-800 tracking-tight uppercase">Acceso de Agentes</h2>
            <p class="text-xs text-slate-500 font-medium">Ingrese sus credenciales para acceder al cotizador de viajes.</p>
        </div>

        <!-- Login Alert Message -->
        <div id="login-alert-message"
            class="hidden p-3 rounded-xl border text-xs font-semibold leading-relaxed transition-all duration-300">
        </div>

        <form id="login-form" class="text-left space-y-5">
            <div class="flex flex-col gap-1.5">
                <label for="login_username"
                    class="text-[10px] font-bold text-slate-500 uppercase tracking-wider">Usuario</label>
                <input type="text" id="login_username" required placeholder="Ej. uriel"
                    class="border border-slate-200/80 rounded-xl px-4 py-3 text-sm font-medium focus:outline-none focus:border-brand-primary focus:ring-4 focus:ring-brand-primary/10 transition-all bg-white/70">
            </div>
            <div class="flex flex-col gap-1.5">
                <label for="login_password"
                    class="text-[10px] font-bold text-slate-500 uppercase tracking-wider">Contraseña</label>
                <div class="relative w-full">
                    <input type="password" id="login_password" required placeholder="••••••••"
                        class="w-full border border-slate-200/80 rounded-xl pl-4 pr-11 py-3 text-sm font-medium focus:outline-none focus:border-brand-primary focus:ring-4 focus:ring-brand-primary/10 transition-all bg-white/70">
                    <button type="button" id="btn-toggle-password"
                        class="absolute right-3.5 top-1/2 -translate-y-1/2 text-slate-400 hover:text-slate-600 focus:outline-none cursor-pointer">
                        <!-- SVG Ojo Abierto -->
                        <svg id="svg-eye-open" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"
                            stroke-width="2">
                            <path stroke-linecap="round" stroke-linejoin="round"
                                d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                            <path stroke-linecap="round" stroke-linejoin="round"
                                d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                        </svg>
                        <!-- SVG Ojo Cerrado -->
                        <svg id="svg-eye-closed" class="w-4 h-4 hidden" fill="none" viewBox="0 0 24 24"
                            stroke="currentColor" stroke-width="2">
                            <path stroke-linecap="round" stroke-linejoin="round"
                                d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l18 18" />
                        </svg>
                    </button>
                </div>
            </div>
            <button type="submit"
                class="w-full mt-2 flex items-center justify-center gap-2 px-6 py-3.5 bg-brand-primary hover:bg-brand-primary/95 text-white font-extrabold text-xs uppercase tracking-wider rounded-xl shadow-lg shadow-brand-primary/20 hover:shadow-brand-primary/30 transition-all duration-300 hover:-translate-y-0.5 cursor-pointer">
                Iniciar Sesión
            </button>
            <button type="button" id="btn-login-guest"
                class="w-full mt-2 flex items-center justify-center gap-2 px-6 py-3.5 bg-slate-100 hover:bg-slate-200/80 text-slate-600 font-extrabold text-xs uppercase tracking-wider rounded-xl transition-all duration-300 cursor-pointer">
                Ingresar como Invitado
            </button>
        </form>

        <!-- Contenedor de Sesión Activa -->
        <div id="session-active-container" class="hidden flex flex-col gap-5 text-left">
            <div class="text-center space-y-2">
                <h2 class="font-display font-extrabold text-lg text-slate-800 tracking-tight uppercase">Sesión Activa</h2>
                <p class="text-xs text-slate-500 font-medium">Se detectó una sesión iniciada en este navegador.</p>
            </div>
            <div class="p-4 bg-brand-primary/5 border border-brand-primary/10 rounded-2xl flex items-center justify-center gap-3">
                <span class="w-2.5 h-2.5 rounded-full bg-emerald-500 animate-pulse"></span>
                <span class="text-xs font-bold text-slate-500 uppercase tracking-wider">Agente: <strong id="session-active-username" class="text-brand-primary font-extrabold text-sm ml-1 select-none">-</strong></span>
            </div>
            <button type="button" id="btn-continue-session"
                class="w-full flex items-center justify-center gap-2 px-6 py-3.5 bg-brand-primary hover:bg-brand-primary/95 text-white font-extrabold text-xs uppercase tracking-wider rounded-xl shadow-lg shadow-brand-primary/20 hover:shadow-brand-primary/30 transition-all duration-300 hover:-translate-y-0.5 cursor-pointer">
                Continuar como <span id="session-active-btn-name" class="uppercase">Agente</span>
            </button>
            <button type="button" id="btn-logout-session"
                class="w-full flex items-center justify-center gap-2 px-6 py-3.5 bg-slate-100 hover:bg-slate-200/80 text-slate-600 font-extrabold text-xs uppercase tracking-wider rounded-xl transition-all duration-300 cursor-pointer">
                Iniciar sesión con otra cuenta
            </button>
        </div>

        <div class="text-[10px] text-slate-400 font-medium">
            © 2026 One Trip Giordano S.R.L. · Todos los derechos reservados
        </div>
    </div>
</div>
