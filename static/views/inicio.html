<div id="inicio-page-container" class="max-w-[95%] mx-auto space-y-10 py-6 opacity-0 transition-opacity duration-500 ease-in-out">
    <!-- Hub Header -->
    <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-6 pb-2">
        <div class="space-y-3">
            <span
                class="text-xs font-black uppercase tracking-widest text-brand-primary bg-rose-50 px-3 py-1 rounded-full">Menú Principal</span>
            <h1 id="welcome-title"
                class="text-4xl md:text-5xl font-black text-slate-900 font-display tracking-tight leading-none min-h-[50px]">
                &nbsp;</h1>
            <p class="text-slate-500 text-sm md:text-base font-medium">Gestión inteligente de presupuestos e itinerarios.</p>
        </div>
    </div>

    <!-- Sección de Recientes -->
    <div id="inicio-recent-section" class="space-y-5 pt-4">
        <div class="flex items-center gap-3">
            <span
                class="text-[10px] font-black uppercase tracking-widest text-brand-primary bg-rose-50 px-2.5 py-1 rounded-full">Últimas Cotizaciones</span>
            <div class="h-[1px] flex-grow bg-slate-100"></div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6" id="recent-quotes-container">
            <!-- Dynamically populated recent quote cards -->
        </div>
    </div>

    <!-- Sección de Accesos Rápidos -->
    <div class="space-y-5 pt-4">
        <div class="flex items-center gap-3">
            <span
                class="text-[10px] font-black uppercase tracking-widest text-slate-450 bg-slate-100 px-2.5 py-1 rounded-full">Accesos Rápidos</span>
            <div class="h-[1px] flex-grow bg-slate-100"></div>
        </div>

        <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-4 gap-4">
            <!-- Cotización Rápida -->
            <div onclick="window.navigateTo('/cotizacion-rapida')" class="group cursor-pointer bg-white border border-slate-200/60 rounded-2xl p-4 shadow-sm hover:shadow-[0_15px_30px_-10px_rgba(0,0,0,0.08)] hover:border-slate-350 hover:-translate-y-1 transition-all duration-300 ease-out flex items-center gap-3.5 min-w-0">
                <div class="w-10 h-10 bg-brand-primary/10 rounded-xl flex items-center justify-center text-brand-primary group-hover:scale-105 transition-transform duration-300 shrink-0 shadow-sm shadow-brand-primary/5">
                    <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M13 10V3L4 14h7v7l9-11h-7z" />
                    </svg>
                </div>
                <span class="text-xs font-bold text-slate-700 group-hover:text-brand-primary transition-colors duration-200 whitespace-nowrap truncate">Cotización Rápida</span>
            </div>

            <!-- Cotización Completa -->
            <div onclick="window.navigateTo('/hacer-cotizacion')" class="group cursor-pointer bg-white border border-slate-200/60 rounded-2xl p-4 shadow-sm hover:shadow-[0_15px_30px_-10px_rgba(0,0,0,0.08)] hover:border-slate-350 hover:-translate-y-1 transition-all duration-300 ease-out flex items-center gap-3.5 min-w-0">
                <div class="w-10 h-10 bg-brand-accent/10 rounded-xl flex items-center justify-center text-brand-accent group-hover:scale-105 transition-transform duration-300 shrink-0 shadow-sm shadow-brand-accent/5">
                    <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253" />
                    </svg>
                </div>
                <span class="text-xs font-bold text-slate-700 group-hover:text-brand-accent transition-colors duration-200 whitespace-nowrap truncate">Cotización Completa</span>
            </div>

            <!-- Archivos -->
            <div onclick="window.navigateTo('/editar')" class="group cursor-pointer bg-white border border-slate-200/60 rounded-2xl p-4 shadow-sm hover:shadow-[0_15px_30px_-10px_rgba(0,0,0,0.08)] hover:border-slate-350 hover:-translate-y-1 transition-all duration-300 ease-out flex items-center gap-3.5 min-w-0">
                <div class="w-10 h-10 bg-blue-50 rounded-xl flex items-center justify-center text-blue-500 group-hover:scale-105 transition-transform duration-300 shrink-0 shadow-sm shadow-blue-500/5">
                    <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M5 8h14M5 8a2 2 0 110-4h14a2 2 0 110 4M5 8v10a2 2 0 002 2h10a2 2 0 002-2V8m-9 4h4" />
                    </svg>
                </div>
                <span class="text-xs font-bold text-slate-700 group-hover:text-blue-500 transition-colors duration-200 whitespace-nowrap truncate">Archivos</span>
            </div>

            <!-- Configuración -->
            <div onclick="window.navigateTo('/config')" class="group cursor-pointer bg-white border border-slate-200/60 rounded-2xl p-4 shadow-sm hover:shadow-[0_15px_30px_-10px_rgba(0,0,0,0.08)] hover:border-slate-350 hover:-translate-y-1 transition-all duration-300 ease-out flex items-center gap-3.5 min-w-0">
                <div class="w-10 h-10 bg-slate-100 rounded-xl flex items-center justify-center text-slate-500 group-hover:scale-105 transition-transform duration-300 shrink-0 shadow-sm shadow-slate-500/5">
                    <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" />
                        <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                    </svg>
                </div>
                <span class="text-xs font-bold text-slate-700 group-hover:text-slate-900 transition-colors duration-200 whitespace-nowrap truncate">Configuración</span>
            </div>
        </div>
    </div>
</div>
