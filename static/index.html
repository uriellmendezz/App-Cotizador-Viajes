<!DOCTYPE html>
<html lang="es" class="scroll-smooth">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cotizador One Trip</title>
    <link rel="icon" type="image/png" href="/assets/favicon.png?v=2">
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800&family=Outfit:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            primary: '#ff545d',
                            secondary: '#343434',
                            accent: '#f79646',
                            lightBg: '#f8fafc',
                            cardBg: 'rgba(255, 255, 255, 0.8)',
                            borderColor: 'rgba(226, 232, 240, 0.8)',
                        }
                    },
                    fontFamily: {
                        sans: ['Montserrat', 'sans-serif'],
                        display: ['Montserrat', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/es.js"></script>
    <link rel="stylesheet" href="/static/css/styles.css">
    
    <style>
        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        input[type=number] {
            -moz-appearance: textfield;
        }
    </style>
</head>

<body class="bg-slate-50 text-slate-800 font-sans min-h-screen selection:bg-brand-primary selection:text-white">
    <!-- Header Navigation -->
    <header class="sticky top-0 z-50 bg-white/80 backdrop-blur-md border-b border-slate-200/80 shadow-sm hidden">
        <div class="max-w-[95%] mx-auto px-4 sm:px-6 lg:px-8 h-20 flex items-center justify-between">
            <div class="flex items-center gap-4">
                <img id="nav-logo" src="/assets/Banner%20letra%20O.png" alt="One Trip Giordano"
                    class="h-9 sm:h-12 w-auto object-contain transition-transform hover:scale-105 cursor-pointer"
                    onclick="navigateTo('/inicio')">
                <div id="logged-user-badge" class="hidden items-center gap-1.5 px-3 py-1.5 bg-slate-50 border border-slate-200/80 rounded-xl text-[10px] font-bold text-slate-500 uppercase tracking-wider select-none">
                    <span class="w-1.5 h-1.5 rounded-full bg-emerald-500"></span>
                    <span>Agente: </span>
                    <span id="logged-username-span" class="text-slate-700 font-extrabold">-</span>
                </div>
            </div>

            <!-- Desktop Navigation Menu -->
            <nav class="hidden lg:flex gap-2 items-center">
                <!-- Dynamic Date & Time -->
                <div id="nav-date-time" class="text-xs font-semibold text-slate-400 select-none mr-4 flex items-center gap-1.5 bg-slate-50 px-4 py-2 border border-slate-100 rounded-full">
                    <svg class="w-3.5 h-3.5 text-slate-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" />
                    </svg>
                    <span class="nav-date-time-text transition-all duration-200 transform inline-block"></span>
                </div>

                <button id="nav-btn-inicio"
                    class="tab-btn px-4 py-2 text-sm font-bold rounded-full transition-all duration-300 active flex items-center gap-1.5 bg-gradient-to-r from-brand-primary to-[#ff7f85] text-white shadow-lg shadow-brand-primary/35"
                    onclick="navigateTo('/inicio')">
                    <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" />
                    </svg>
                    Inicio
                </button>
                <button
                    class="px-4 py-2 text-sm font-bold rounded-full bg-rose-50 text-rose-600 hover:bg-rose-100 hover:text-rose-700 shadow-sm transition-all duration-300 ml-2 cursor-pointer flex items-center gap-1.5"
                    onclick="confirmLogout()">
                    <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
                    </svg>
                    Salir
                </button>
            </nav>

            <!-- Mobile Menu Button (Hamburger) -->
            <div class="flex items-center lg:hidden">
                <button id="mobile-menu-btn" onclick="toggleMobileMenu()" class="p-2 rounded-xl text-slate-500 hover:text-slate-800 hover:bg-slate-100 transition-all cursor-pointer focus:outline-none">
                    <svg id="hamburger-icon" class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h16" />
                    </svg>
                    <svg id="close-icon" class="w-6 h-6 hidden" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
                    </svg>
                </button>
            </div>
        </div>
    </header>

    <!-- Mobile Dropdown Menu -->
    <div id="mobile-menu" class="hidden lg:hidden border-b border-slate-200 bg-white/95 backdrop-blur-md transition-all duration-300 py-4 px-4 space-y-2 shadow-md">
        <!-- Dynamic Date & Time Mobile -->
        <div class="px-4 py-2.5 text-xs font-semibold text-slate-500 select-none flex items-center gap-1.5 bg-slate-50 border border-slate-100 rounded-xl mb-2">
            <svg class="w-3.5 h-3.5 text-slate-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" />
            </svg>
            <span class="nav-date-time-text transition-all duration-200 transform inline-block"></span>
        </div>
        <button id="mobile-nav-btn-inicio"
            class="w-full text-left px-4 py-2.5 text-sm font-bold rounded-xl transition-all duration-200 hover:bg-slate-100 text-slate-700 flex items-center gap-1.5"
            onclick="navigateTo('/inicio'); toggleMobileMenu();">
            <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
                <path stroke-linecap="round" stroke-linejoin="round" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" />
            </svg>
            Inicio
        </button>
        <button id="mobile-nav-btn-logout"
            class="w-full text-left px-4 py-2.5 text-sm font-bold rounded-xl bg-rose-50 text-rose-600 hover:bg-rose-100 transition-all duration-200 flex items-center gap-1.5"
            onclick="confirmLogout(); toggleMobileMenu();">
            <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
                <path stroke-linecap="round" stroke-linejoin="round" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
            </svg>
            Salir
        </button>
    </div>

    <!-- Global Alert Message -->
    <div class="max-w-[95%] mx-auto px-4 sm:px-6 lg:px-8 pt-6">
        <div id="alert-message" class="alert hidden p-4 rounded-xl font-semibold border text-sm transition-all duration-300"></div>
    </div>

    <!-- Global App Target Container -->
    <main id="app" class="max-w-[95%] mx-auto px-4 sm:px-6 lg:px-8 pt-10 pb-32 lg:pb-10 transition-opacity duration-150 ease-in-out opacity-100">
    </main>

    <!-- Loading Overlay -->
    <div id="loading-overlay" class="fixed inset-0 bg-slate-950/40 backdrop-blur-md z-[5000] flex flex-col items-center justify-center gap-6 hidden transition-opacity duration-300">
        <div class="relative w-20 h-20 flex items-center justify-center">
            <!-- Spinning Ring -->
            <div class="absolute inset-0 border-4 border-brand-primary/10 rounded-full"></div>
            <div class="absolute inset-0 border-4 border-brand-primary rounded-full animate-spin border-t-transparent"></div>
            
            <!-- Centered Cycling Icon -->
            <span id="loading-travel-icon" class="block w-8 h-8 text-brand-primary transition-all duration-300 ease-in-out transform">
                <!-- Default compass icon -->
                <svg class="w-8 h-8" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
                    <circle cx="12" cy="12" r="10"></circle>
                    <polygon points="16.24,7.76 14.12,14.12 7.76,16.24 9.88,9.88"></polygon>
                </svg>
            </span>
        </div>
        <span id="loading-text" class="text-sm font-extrabold text-white tracking-widest uppercase text-center max-w-xs drop-shadow-sm select-none">Generando...</span>
    </div>

    <!-- Custom Confirm Modal -->
    <div id="confirm-modal" class="fixed inset-0 bg-slate-950/40 backdrop-blur-sm z-[6000] flex items-center justify-center p-4 opacity-0 pointer-events-none transition-all duration-300">
        <div id="confirm-modal-box" class="bg-white border border-slate-200/80 rounded-3xl p-6 lg:p-8 shadow-2xl max-w-sm w-full transform scale-90 transition-all duration-300 flex flex-col gap-5">
            <!-- Icon/Title header -->
            <div class="flex items-center gap-3 border-b border-slate-100 pb-3">
                <span class="p-2 bg-amber-50 rounded-xl text-amber-500">
                    <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
                    </svg>
                </span>
                <h3 id="confirm-modal-title" class="font-display font-black text-base text-slate-800 tracking-tight uppercase">¿Confirmar Acción?</h3>
            </div>
            <!-- Description -->
            <p id="confirm-modal-desc" class="text-xs text-slate-500 font-semibold leading-relaxed">¿Estás seguro de realizar esta acción?</p>
            <!-- Actions -->
            <div class="flex gap-3 pt-2">
                <button type="button" onclick="closeConfirmModal(false)" class="flex-1 px-4 py-2.5 bg-slate-100 hover:bg-slate-200/80 text-slate-600 font-bold text-xs uppercase tracking-wider rounded-xl transition-all cursor-pointer">
                    Cancelar
                </button>
                <button type="button" id="confirm-modal-btn-confirm" onclick="closeConfirmModal(true)" class="flex-1 px-4 py-2.5 bg-brand-primary hover:bg-brand-primary/95 text-white font-bold text-xs uppercase tracking-wider rounded-xl shadow-md shadow-brand-primary/20 transition-all cursor-pointer">
                    Confirmar
                </button>
            </div>
        </div>
    </div>

    <!-- Application Controller -->
    <script type="module" src="/static/js/main.js"></script>
</body>

</html>
