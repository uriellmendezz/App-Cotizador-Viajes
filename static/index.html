<!DOCTYPE html>
<html lang="es" class="scroll-smooth">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cotizador One Trip</title>
    <link rel="icon" type="image/png" href="/assets/favicon.png?v=2">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800&family=Outfit:wght@400;500;600;700;800;900&display=swap"
        rel="stylesheet">

    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            primary: '#ff545d',
                            secondary: '#343434',
                            accent: '#f79646',
                            lightBg: '#f8fafc',
                            cardBg: 'rgba(255, 255, 255, 0.8)',
                            borderColor: 'rgba(226, 232, 240, 0.8)',
                        }
                    },
                    fontFamily: {
                        sans: ['Montserrat', 'sans-serif'],
                        display: ['Montserrat', 'sans-serif'],
                    }
                }
            }
        }
    </script>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/es.js"></script>
    <link rel="stylesheet" href="/static/css/styles.css">

    <style>
        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        input[type=number] {
            -moz-appearance: textfield;
        }
    </style>
</head>

<body
    class="bg-slate-50 text-slate-800 font-sans min-h-screen selection:bg-brand-primary selection:text-white flex flex-col lg:flex-row overflow-x-hidden">
    <!-- Sidebar Navigation -->
    <aside id="app-sidebar"
        class="fixed top-0 left-0 bottom-0 w-[260px] sidebar-light text-slate-600 border-r z-50 flex flex-col justify-between -translate-x-full lg:translate-x-0 transition-transform duration-300 hidden">
        <!-- Top: Brand Logo & Section Grouping -->
        <div class="flex flex-col flex-1 py-6 px-4 space-y-8 overflow-y-auto">
            <!-- Brand Logo -->
            <div class="flex items-center gap-3 px-2">
                <img id="sidebar-logo" src="/assets/Banner%20letra%20O.png" alt="Logo"
                    class="h-14 w-auto object-contain cursor-pointer transition-transform hover:scale-105"
                    onclick="navigateTo('/inicio')">
            </div>

            <!-- Section 0: Inicio -->
            <div class="space-y-1">
                <button id="sidebar-btn-inicio" onclick="navigateTo('/inicio')" data-tooltip="Inicio"
                    class="sidebar-item sidebar-item-style w-full flex items-center gap-3 px-3 py-2.5 rounded-xl text-xs font-bold cursor-pointer">
                    <svg class="w-4 h-4 shrink-0 text-slate-500" fill="none" viewBox="0 0 24 24"
                        stroke="currentColor" stroke-width="2.5">
                        <path stroke-linecap="round" stroke-linejoin="round"
                            d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" />
                    </svg>
                    <span class="sidebar-text">Inicio</span>
                </button>
            </div>

            <!-- Section 1: Crear -->
            <div class="space-y-3">
                <span class="px-3 text-[10px] font-black uppercase tracking-widest text-slate-400 sidebar-section-header">Crear</span>
                <div class="space-y-1">
                    <!-- Cotizaciones Rápidas -->
                    <button id="sidebar-btn-quick-quote" onclick="navigateTo('/cotizacion-rapida')" data-tooltip="Cotización Rápida"
                        class="sidebar-item sidebar-item-style w-full flex items-center gap-3 px-3 py-2.5 rounded-xl text-xs font-bold cursor-pointer">
                        <svg class="w-4 h-4 shrink-0 text-slate-500" fill="none" viewBox="0 0 24 24"
                            stroke="currentColor" stroke-width="2.5">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M13 10V3L4 14h7v7l9-11h-7z" />
                        </svg>
                        <span class="sidebar-text">Cotización Rápida</span>
                    </button>
                    <!-- Cotizaciones Completas -->
                    <button id="sidebar-btn-full-quote" onclick="navigateTo('/hacer-cotizacion')" data-tooltip="Cotización Completa"
                        class="sidebar-item sidebar-item-style w-full flex items-center gap-3 px-3 py-2.5 rounded-xl text-xs font-bold cursor-pointer">
                        <svg class="w-4 h-4 shrink-0 text-slate-500" fill="none" viewBox="0 0 24 24"
                            stroke="currentColor" stroke-width="2.5">
                            <path stroke-linecap="round" stroke-linejoin="round"
                                d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253" />
                        </svg>
                        <span class="sidebar-text">Cotización Completa</span>
                    </button>
                </div>
            </div>

            <!-- Section 2: Gestión -->
            <div class="space-y-3">
                <span class="px-3 text-[10px] font-black uppercase tracking-widest text-slate-400 sidebar-section-header">Gestión</span>
                <div class="space-y-1">
                    <!-- Archivos -->
                    <button id="sidebar-btn-editar" onclick="navigateTo('/editar')" data-tooltip="Archivos"
                        class="sidebar-item sidebar-item-style w-full flex items-center gap-3 px-3 py-2.5 rounded-xl text-xs font-bold cursor-pointer">
                        <svg class="w-4 h-4 shrink-0 text-slate-500" fill="none" viewBox="0 0 24 24"
                            stroke="currentColor" stroke-width="2.5">
                            <path stroke-linecap="round" stroke-linejoin="round"
                                d="M3 7v10a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-6l-2-2H5a2 2 0 00-2 2z" />
                        </svg>
                        <span class="sidebar-text">Archivos</span>
                    </button>
                    <!-- Configuración -->
                    <button id="sidebar-btn-config" onclick="navigateTo('/config')" data-tooltip="Configuración"
                        class="sidebar-item sidebar-item-style w-full flex items-center gap-3 px-3 py-2.5 rounded-xl text-xs font-bold cursor-pointer">
                        <svg class="w-4 h-4 shrink-0 text-slate-500" fill="none" viewBox="0 0 24 24"
                            stroke="currentColor" stroke-width="2.5">
                            <path stroke-linecap="round" stroke-linejoin="round"
                                d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" />
                            <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                        </svg>
                        <span class="sidebar-text">Configuración</span>
                    </button>
                </div>
            </div>
        </div>

        <!-- Bottom: Session Badge & Logout -->
        <div class="p-4 border-t border-slate-200 space-y-4">
            <!-- Session Badge -->
            <div id="sidebar-user-badge"
                class="hidden items-center gap-2.5 px-3 py-2 bg-slate-200/30 border border-slate-200/60 rounded-xl text-[10px] font-bold text-slate-600 uppercase tracking-wider select-none">
                <span class="w-1.5 h-1.5 rounded-full bg-emerald-500 animate-pulse shrink-0"></span>
                <span class="sidebar-text">Agente: </span>
                <span id="sidebar-username-span" class="text-slate-700 font-extrabold sidebar-text">-</span>
            </div>

            <!-- Logout Button -->
            <button onclick="confirmLogout()" data-tooltip="Cerrar Sesión"
                class="w-full flex items-center gap-3 px-3 py-2.5 rounded-xl text-xs font-bold text-rose-600 hover:bg-rose-50 hover:text-rose-700 border border-transparent hover:border-rose-100 transition-all cursor-pointer">
                <svg class="w-4 h-4 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
                    <path stroke-linecap="round" stroke-linejoin="round"
                        d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
                </svg>
                <span class="sidebar-text">Cerrar Sesión</span>
            </button>
        </div>
    </aside>

    <!-- Mobile Sidebar Backdrop -->
    <div id="sidebar-backdrop"
        class="fixed inset-0 bg-slate-950/40 backdrop-blur-sm z-40 hidden lg:hidden transition-opacity duration-300"
        onclick="toggleSidebar(false)"></div>

    <!-- Main Layout Content Wrapper -->
    <div id="main-content-wrapper" class="flex-grow w-full transition-all duration-300">
        <!-- Sticky Top Header (Visible on all screens) -->
        <header id="app-top-header"
            class="sticky top-0 z-40 bg-white/80 backdrop-blur-md border-b border-slate-200/80 flex items-center justify-between px-6 h-16 w-full transition-all duration-300 hidden">
            <div class="flex items-center gap-4">
                <!-- Sidebar Toggle Button (Chevron Arrow) -->
                <button onclick="toggleSidebar()"
                    class="p-2 rounded-xl text-slate-500 hover:text-slate-800 hover:bg-slate-100 cursor-pointer transition-colors focus:outline-none">
                    <svg id="sidebar-toggle-chevron" class="w-6 h-6 transition-transform duration-300 transform"
                        fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7" />
                    </svg>
                </button>
                <!-- Inicio Button -->
                <button id="top-nav-inicio-btn" onclick="navigateTo('/inicio')"
                    class="flex items-center gap-1.5 px-3 py-1.5 bg-slate-50 hover:bg-slate-100 text-slate-600 hover:text-slate-800 border border-slate-200 rounded-xl text-xs font-bold transition-all cursor-pointer focus:outline-none hidden">
                    <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round"
                            d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" />
                    </svg>
                    Inicio
                </button>
            </div>
            <!-- Dynamic Date & Time -->
            <div id="nav-date-time"
                class="text-xs font-semibold text-slate-400 select-none flex items-center gap-1.5 bg-slate-50 px-4 py-2 border border-slate-100 rounded-full">
                <svg class="w-3.5 h-3.5 text-slate-400" fill="none" viewBox="0 0 24 24" stroke="currentColor"
                    stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round"
                        d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" />
                </svg>
                <span class="nav-date-time-text transition-all duration-200 transform inline-block"></span>
            </div>
        </header>

        <!-- Global Alert Message -->
        <div class="max-w-[98%] mx-auto px-4 sm:px-6 lg:px-8 pt-6">
            <div id="alert-message"
                class="alert hidden p-4 rounded-xl font-semibold border text-sm transition-all duration-300"></div>
        </div>

        <!-- Global App Target Container -->
        <main id="app"
            class="max-w-[98%] mx-auto px-4 sm:px-6 lg:px-8 pt-6 pb-32 lg:pb-10 transition-opacity duration-150 ease-in-out opacity-100">
        </main>
    </div>

    <!-- Loading Overlay -->
    <div id="loading-overlay"
        class="fixed inset-0 bg-slate-950/40 backdrop-blur-md z-[5000] flex flex-col items-center justify-center gap-6 hidden transition-opacity duration-300">
        <div class="relative w-20 h-20 flex items-center justify-center">
            <!-- Spinning Ring -->
            <div class="absolute inset-0 border-4 border-brand-primary/10 rounded-full"></div>
            <div class="absolute inset-0 border-4 border-brand-primary rounded-full animate-spin border-t-transparent">
            </div>

            <!-- Centered Cycling Icon -->
            <span id="loading-travel-icon"
                class="block w-8 h-8 text-brand-primary transition-all duration-300 ease-in-out transform">
                <!-- Default compass icon -->
                <svg class="w-8 h-8" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
                    <circle cx="12" cy="12" r="10"></circle>
                    <polygon points="16.24,7.76 14.12,14.12 7.76,16.24 9.88,9.88"></polygon>
                </svg>
            </span>
        </div>
        <span id="loading-text"
            class="text-sm font-extrabold text-white tracking-widest uppercase text-center max-w-xs drop-shadow-sm select-none">Generando...</span>
    </div>

    <!-- Custom Confirm Modal -->
    <div id="confirm-modal"
        class="fixed inset-0 bg-slate-950/40 backdrop-blur-sm z-[6000] flex items-center justify-center p-4 opacity-0 pointer-events-none transition-all duration-300">
        <div id="confirm-modal-box"
            class="bg-white border border-slate-200/80 rounded-3xl p-6 lg:p-8 shadow-2xl max-w-sm w-full transform scale-90 transition-all duration-300 flex flex-col gap-5">
            <!-- Icon/Title header -->
            <div class="flex items-center gap-3 border-b border-slate-100 pb-3">
                <span class="p-2 bg-amber-50 rounded-xl text-amber-500">
                    <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
                        <path stroke-linecap="round" stroke-linejoin="round"
                            d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
                    </svg>
                </span>
                <h3 id="confirm-modal-title"
                    class="font-display font-black text-base text-slate-800 tracking-tight uppercase">¿Confirmar Acción?
                </h3>
            </div>
            <!-- Description -->
            <p id="confirm-modal-desc" class="text-xs text-slate-500 font-semibold leading-relaxed">¿Estás seguro de
                realizar esta acción?</p>
            <!-- Actions -->
            <div class="flex gap-3 pt-2">
                <button type="button" onclick="closeConfirmModal(false)"
                    class="flex-1 px-4 py-2.5 bg-slate-100 hover:bg-slate-200/80 text-slate-600 font-bold text-xs uppercase tracking-wider rounded-xl transition-all cursor-pointer">
                    Cancelar
                </button>
                <button type="button" id="confirm-modal-btn-confirm" onclick="closeConfirmModal(true)"
                    class="flex-1 px-4 py-2.5 bg-brand-primary hover:bg-brand-primary/95 text-white font-bold text-xs uppercase tracking-wider rounded-xl shadow-md shadow-brand-primary/20 transition-all cursor-pointer">
                    Confirmar
                </button>
            </div>
        </div>
    </div>

    <!-- Application Controller -->
    <script type="module" src="/static/js/main.js"></script>
</body>

</html>
