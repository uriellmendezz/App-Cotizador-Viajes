<!DOCTYPE html>
<html lang="es" class="scroll-smooth">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cotizador One Trip</title>
    <link rel="icon" type="image/png" href="/assets/favicon.png?v=2">
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800&family=Outfit:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            primary: '#ff545d',
                            secondary: '#343434',
                            accent: '#f79646',
                            lightBg: '#f8fafc',
                            cardBg: 'rgba(255, 255, 255, 0.8)',
                            borderColor: 'rgba(226, 232, 240, 0.8)',
                        }
                    },
                    fontFamily: {
                        sans: ['Montserrat', 'sans-serif'],
                        display: ['Outfit', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/es.js"></script>
    <link rel="stylesheet" href="/static/css/styles.css">
    
    <style>
        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        input[type=number] {
            -moz-appearance: textfield;
        }
    </style>
</head>

<body class="bg-slate-50 text-slate-800 font-sans min-h-screen selection:bg-brand-primary selection:text-white">
    <!-- Header Navigation -->
    <header class="sticky top-0 z-50 bg-white/80 backdrop-blur-md border-b border-slate-200/80 shadow-sm hidden">
        <div class="max-w-[95%] mx-auto px-4 sm:px-6 lg:px-8 h-20 flex items-center justify-between">
            <div class="flex items-center gap-4">
                <img id="nav-logo" src="/assets/Banner%20letra%20O.png" alt="One Trip Giordano"
                    class="h-9 sm:h-12 w-auto object-contain transition-transform hover:scale-105 cursor-pointer"
                    onclick="navigateTo('/inicio')">
            </div>

            <!-- Desktop Navigation Menu -->
            <nav class="hidden lg:flex gap-2 items-center">
                <button id="nav-btn-inicio"
                    class="tab-btn px-4 py-2 text-sm font-bold rounded-full transition-all duration-300 active flex items-center gap-1.5 bg-gradient-to-r from-brand-primary to-[#ff7f85] text-white shadow-lg shadow-brand-primary/35"
                    onclick="navigateTo('/inicio')">
                    <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" />
                    </svg>
                    Inicio
                </button>
                <button id="nav-btn-new-quote"
                    class="tab-btn px-4 py-2 text-sm font-bold rounded-full transition-all duration-300 text-slate-500 hover:text-slate-800 hover:bg-slate-100 flex items-center gap-1.5"
                    onclick="navigateTo('/cotizar')">
                    <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
                    </svg>
                    Formulario
                </button>
                <button id="nav-btn-quick-quote"
                    class="tab-btn px-4 py-2 text-sm font-bold rounded-full transition-all duration-300 text-slate-500 hover:text-slate-800 hover:bg-slate-100 flex items-center gap-1.5"
                    onclick="navigateTo('/presupuesto-rapido')">
                    <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M9 17v-2m3 2v-4m3 4v-6m2 10H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
                    </svg>
                    Presupuesto Rápido
                </button>
                <button id="nav-btn-saved-quotes"
                    class="tab-btn px-4 py-2 text-sm font-bold rounded-full transition-all duration-300 text-slate-500 hover:text-slate-800 hover:bg-slate-100 flex items-center gap-1.5"
                    onclick="navigateTo('/editar')">
                    <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-3 7h3m-3 4h3m-6-4h.01m-.01 4h.01" />
                    </svg>
                    Cotizaciones Guardadas
                </button>
                <button id="nav-btn-config"
                    class="tab-btn px-4 py-2 text-sm font-bold rounded-full transition-all duration-300 text-slate-500 hover:text-slate-800 hover:bg-slate-100 flex items-center gap-1.5"
                    onclick="navigateTo('/config')">
                    <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" />
                        <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                    </svg>
                    Configuración
                </button>
                <button
                    class="px-4 py-2 text-sm font-bold rounded-full bg-rose-50 text-rose-600 hover:bg-rose-100 hover:text-rose-700 shadow-sm transition-all duration-300 ml-2 cursor-pointer flex items-center gap-1.5"
                    onclick="logoutAgent()">
                    <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
                    </svg>
                    Salir
                </button>
            </nav>

            <!-- Mobile Menu Button (Hamburger) -->
            <div class="flex items-center lg:hidden">
                <button id="mobile-menu-btn" onclick="toggleMobileMenu()" class="p-2 rounded-xl text-slate-500 hover:text-slate-800 hover:bg-slate-100 transition-all cursor-pointer focus:outline-none">
                    <svg id="hamburger-icon" class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h16" />
                    </svg>
                    <svg id="close-icon" class="w-6 h-6 hidden" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
                    </svg>
                </button>
            </div>
        </div>
    </header>

    <!-- Mobile Dropdown Menu -->
    <div id="mobile-menu" class="hidden lg:hidden border-b border-slate-200 bg-white/95 backdrop-blur-md transition-all duration-300 py-4 px-4 space-y-2 shadow-md">
        <button id="mobile-nav-btn-inicio"
            class="w-full text-left px-4 py-2.5 text-sm font-bold rounded-xl transition-all duration-200 hover:bg-slate-100 text-slate-700 flex items-center gap-1.5"
            onclick="navigateTo('/inicio'); toggleMobileMenu();">
            <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
                <path stroke-linecap="round" stroke-linejoin="round" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" />
            </svg>
            Inicio
        </button>
        <button id="mobile-nav-btn-new-quote"
            class="w-full text-left px-4 py-2.5 text-sm font-bold rounded-xl transition-all duration-200 hover:bg-slate-100 text-slate-700 flex items-center gap-1.5"
            onclick="navigateTo('/cotizar'); toggleMobileMenu();">
            <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
                <path stroke-linecap="round" stroke-linejoin="round" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
            </svg>
            Formulario
        </button>
        <button id="mobile-nav-btn-quick-quote"
            class="w-full text-left px-4 py-2.5 text-sm font-bold rounded-xl transition-all duration-200 hover:bg-slate-100 text-slate-700 flex items-center gap-1.5"
            onclick="navigateTo('/presupuesto-rapido'); toggleMobileMenu();">
            <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
                <path stroke-linecap="round" stroke-linejoin="round" d="M9 17v-2m3 2v-4m3 4v-6m2 10H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
            </svg>
            Presupuesto Rápido
        </button>
        <button id="mobile-nav-btn-saved-quotes"
            class="w-full text-left px-4 py-2.5 text-sm font-bold rounded-xl transition-all duration-200 hover:bg-slate-100 text-slate-700 flex items-center gap-1.5"
            onclick="navigateTo('/editar'); toggleMobileMenu();">
            <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
                <path stroke-linecap="round" stroke-linejoin="round" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-3 7h3m-3 4h3m-6-4h.01m-.01 4h.01" />
            </svg>
            Cotizaciones Guardadas
        </button>
        <button id="mobile-nav-btn-config"
            class="w-full text-left px-4 py-2.5 text-sm font-bold rounded-xl transition-all duration-200 hover:bg-slate-100 text-slate-700 flex items-center gap-1.5"
            onclick="navigateTo('/config'); toggleMobileMenu();">
            <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
                <path stroke-linecap="round" stroke-linejoin="round" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" />
                <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
            </svg>
            Configuración
        </button>
        <button id="mobile-nav-btn-logout"
            class="w-full text-left px-4 py-2.5 text-sm font-bold rounded-xl bg-rose-50 text-rose-600 hover:bg-rose-100 transition-all duration-200 flex items-center gap-1.5"
            onclick="logoutAgent(); toggleMobileMenu();">
            <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
                <path stroke-linecap="round" stroke-linejoin="round" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
            </svg>
            Salir
        </button>
    </div>

    <!-- Global App Target Container -->
    <main id="app" class="max-w-[95%] mx-auto px-4 sm:px-6 lg:px-8 pt-10 pb-32 lg:pb-10">
        <!-- Global Alert Message -->
        <div id="alert-message" class="alert hidden mb-6 p-4 rounded-xl font-semibold border text-sm transition-all duration-300"></div>
    </main>

    <!-- Loading Overlay -->
    <div id="loading-overlay" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-50 flex items-center justify-center hidden transition-all duration-300">
        <div class="bg-white/90 p-8 rounded-3xl shadow-2xl flex flex-col items-center gap-4 max-w-sm border border-slate-100">
            <div class="relative w-16 h-16">
                <div class="absolute inset-0 border-4 border-slate-100 rounded-full"></div>
                <div class="absolute inset-0 border-4 border-brand-primary rounded-full animate-spin border-t-transparent"></div>
            </div>
            <span id="loading-text" class="text-sm font-bold text-slate-700 tracking-wide text-center">Generando...</span>
        </div>
    </div>

    <!-- Application Controller -->
    <script type="module" src="/static/js/main.js"></script>
</body>

</html>
